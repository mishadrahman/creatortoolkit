      gtag('config', 'G-ED0M53G8JN');

    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <title>Toolzet</title>
    <script type="text/javascript">
      // SPA GitHub Pages Routing Redirection parser
      (function(l) {
        if (l.search[1] === 'p') {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&') 
          }).reduce(function(r, s) {
            var name = s.split('=')[0];
            var value = s.split('=')[1];
            r[name] = value;
            return r;
          }, {});
          if (decoded.p !== undefined) {
            window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + (decoded.p ? '/' + decoded.p : '') +
              (decoded.q ? '?' + decoded.q : '') +
              l.hash
            );
          }
        }
      }(window.location));
    </script>
    <script>
      (function() {
        const theme = localStorage.getItem('theme');
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
  </head>
  <body class="h-full antialiased bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-200">
    <div id="root" class="h-full"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
