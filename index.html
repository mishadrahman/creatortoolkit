<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="dns-prefetch" href="https://www.googletagmanager.com" />
    <link rel="dns-prefetch" href="https://i.ibb.co.com" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Render-blocking CSS optimization: load Google Fonts asynchronously with correct syntax -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    </noscript>
    
    <link rel="preconnect" href="https://i.ibb.co.com" crossorigin />
    <!-- Preload critical images to eliminate LCP delay and layout shift -->
    <link rel="preload" href="https://i.ibb.co.com/F4XzwCsC/file-0000000054407209a4f9585660c0b08f.avif" as="image" type="image/avif" crossorigin />
    <link rel="preload" href="https://i.ibb.co.com/rR9kK34n/favicon.jpg" as="image" type="image/jpeg" crossorigin />
    <link rel="icon" type="image/jpeg" href="https://i.ibb.co.com/rR9kK34n/favicon.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Toolzet</title>
    
    <!-- Google tag (gtag.js) SEO & PageSpeed Ultra-Optimization -->
    <script>
      (function() {
        let initialized = false;
        const initGtag = () => {
          if (initialized) return;
          initialized = true;
          
          // Clean up performance event listeners
          window.removeEventListener('scroll', initGtag);
          window.removeEventListener('mousemove', initGtag);
          window.removeEventListener('touchstart', initGtag);
          window.removeEventListener('keydown', initGtag);
          clearTimeout(timeoutId);

          const s = document.createElement('script');
          s.async = true;
          s.src = "https://www.googletagmanager.com/gtag/js?id=G-ED0M53G8JN";
          document.head.appendChild(s);
          
          window.dataLayer = window.dataLayer || [];
          function gtag(){dataLayer.push(arguments);}
          window.gtag = gtag;
          gtag('js', new Date());
          gtag('config', 'G-ED0M53G8JN', { 'anonymize_ip': true });
        };

        // Delay Gtag init until first user interaction or fallback timeout (3500ms)
        // This removes third-party scripts from critical rendering path, making Lighthouse Score 95+!
        const timeoutId = setTimeout(initGtag, 3500);
        window.addEventListener('scroll', initGtag, { passive: true });
        window.addEventListener('mousemove', initGtag, { passive: true });
        window.addEventListener('touchstart', initGtag, { passive: true });
        window.addEventListener('keydown', initGtag, { passive: true });
      })();
    </script>
    <script type="text/javascript">
      // SPA GitHub Pages Routing Redirection parser
      (function(l) {
        if (l.search[1] === 'p') {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&') 
          }).reduce(function(r, s) {
            var name = s.split('=')[0];
            var value = s.split('=')[1];
            r[name] = value;
            return r;
          }, {});
          if (decoded.p !== undefined) {
            window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + (decoded.p ? '/' + decoded.p : '') +
              (decoded.q ? '?' + decoded.q : '') +
              l.hash
            );
          }
        }
      }(window.location));
    </script>
    <script>
      (function() {
        const theme = localStorage.getItem('theme');
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
  </head>
  <body class="h-full antialiased bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-200">
    <div id="root" class="h-full"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
