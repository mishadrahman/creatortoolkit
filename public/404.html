<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Creator Toolkit</title>
    <script type="text/javascript">
      // SPA GitHub Pages Redirection Hack
      // See https://github.com/rafgraph/spa-github-pages for licensing details
      var pathSegmentsToKeep = 1; // Since repository is at /creatortoolkit/

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?p=' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
