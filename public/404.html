<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Toolzet</title>
    <script type="text/javascript">
      // SPA GitHub Pages Redirection Hack
      // See https://github.com/rafgraph/spa-github-pages for licensing details
      
      // Dynamically detect path segments to keep
      // If hosted on GitHub pages subdirectory (e.g., username.github.io/creatortoolkit/), use 1 segment.
      // If hosted on a custom apex domain (e.g. toolzet.xyz), there is no subdirectory, so keep 0 segments.
      var pathSegmentsToKeep = 0;
      if (window.location.hostname.indexOf('github.io') !== -1) {
        var pathParts = window.location.pathname.split('/');
        if (pathParts[1] && pathParts[1] !== 'index.html') {
          pathSegmentsToKeep = 1;
        }
      }

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?p=' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
